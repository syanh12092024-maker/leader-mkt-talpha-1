# ─── 13. GIÁ BÁN (PRICING TIERS) ───
# POS lưu giá ÷100 (10000 = 100.00 AED)
# Doanh thu đơn = COD = money_to_collect (bao gồm cả product + ship)
# Giá = giá gộp toàn đơn, KHÔNG tách per-item
pos_price_divisor: 100          # Chia POS value cho 100 để ra đơn vị thật

pricing_tiers:
  AE:                           # UAE (AED)
    1: 99                       # 1 SP = 99 AED
    2: 149                      # Combo 2 SP = 149 AED
    3: 199                      # Combo 3 SP ≈ 199 AED (cần xác nhận thêm)
    4: 199                      # Combo 4 SP ≈ 99-149 AED → cần data thêm
    note: "Thực tế: 1SP=89-100, 2SP=99-149, 4SP=99-149"
  KW:                           # Kuwait (KWD)
    1: 9                        # 1 SP ≈ 8-11 KWD
    2: 13                       # Combo 2 SP ≈ 8-14 KWD
    3: 13                       # Combo 3 SP ≈ 13 KWD (chỉ 1 đơn mẫu)
    4: 14                       # Combo 4 SP ≈ 11-19 KWD
    note: "Giá biến động nhiều: 8-19 KWD"
  OM:                           # Oman (OMR)
    1: 12                       # 1 SP ≈ 10-12 OMR
    2: 12                       # Combo 2 SP ≈ 11-24 OMR
    note: "Chưa đủ data combo 3/4"
  SA:                           # Saudi (SAR) — chờ POS fix để kéo data
    1: ""
    2: ""
    note: "❌ Chưa có data — Saudi POS lỗi 500"
  QA:                           # Qatar (QAR) — chưa có API key
    1: ""
    2: ""
    note: "❌ Chưa có POS API key"
  BH:                           # Bahrain (BHD) — chưa có API key
    1: ""
    2: ""
    note: "❌ Chưa có POS API key"

