  cost_source:
    - "pos"                     # Giá vốn nhập trên POS khi nhập kho/SP mới
    - "google_sheet"            # Bổ sung qua Google Sheet upload vào config
  fixed_costs: "pending"        # Sẽ mapping sau
  pos_revenue_field: "cod"      # Doanh thu = field COD / money_to_collect

