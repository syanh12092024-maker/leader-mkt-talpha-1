# ─── 6. FULFILLMENT (3PL) ───
# Bảng phí chính xác theo từng thị trường (valid_from: 2026-01-01)
#
# 💡 CÔNG THỨC TÍNH PHÍ:
#   ✅ Giao THÀNH CÔNG = packing_fee + delivery_fee + (order_value × cod_fee_pct)
#   ❌ Giao THẤT BẠI   = packing_fee + return_fee
#
fulfillment:
  primary_3pl: "iMile, Aramex"
  carriers:
    - partner: "iMile"
      market_code: 966
      market_name: "Saudi Arabia"
      packing_fee: 2.5              # Phí đóng gói mỗi đơn (luôn tính)
      delivery_fee: 15.0            # Phí giao thành công
      cod_fee_pct: 0.03             # Phí thu hộ COD (3%)
      return_fee: 5.0                # ❌ CẦN BỔ SUNG — phí hoàn hàng
      currency: SAR
      warehouse: ""                 # Cập nhật sau
    - partner: "iMile"
      market_code: 971
      market_name: "UAE"
      packing_fee: 3.0
      delivery_fee: 12.0
      cod_fee_pct: 0.03
      return_fee: 0.0                # ❌ CẦN BỔ SUNG
      currency: AED
      warehouse: ""
    - partner: "PostaPlus"
      market_code: 965
      market_name: "Kuwait"
      packing_fee: 0.2              # Phí thao tác, đóng gói
      delivery_fee: 0.9             # Phí ship
      cod_fee_pct: 0                # PostaPlus dùng phí cố định, không theo %
      cod_fee_flat: 0.25            # Phí thu hộ COD (0.25 KWD/đơn GTC)
      return_fee: 0.25              # Phí hoàn
      currency: KWD
      warehouse: ""
    - partner: "iMile"
      market_code: 974
      market_name: "Qatar"
      packing_fee: 3.0
      delivery_fee: 17.0
      cod_fee_pct: 0.04
      return_fee: 5.0
      currency: QAR
      warehouse: ""
    - partner: "iMile"
      market_code: 968
      market_name: "Oman"
      packing_fee: 0.4
      delivery_fee: 2.0
      cod_fee_pct: 0.04
      return_fee: ""                # ❌ CẦN BỔ SUNG
      currency: OMR
      warehouse: ""
    - partner: "Aramex"
      market_code: 973
      market_name: "Bahrain"
      packing_fee: 0.4
      delivery_fee: 2.0
      cod_fee_pct: 0.05
      return_fee: ""                # ❌ CẦN BỔ SUNG
      currency: BHD
      warehouse: ""
  tracking_enabled: false

